server {
    # Listen on port 8080 as expected by Cloud Run
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Any route that doesn't have a file extension (e.g. /about) is routed to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
